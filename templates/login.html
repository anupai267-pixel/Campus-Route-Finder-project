{% extends "base.html" %}
{% block title %}Login - Campus Route Finder{% endblock %}
{% block content %}
<div class="auth-card">
  <h1>Welcome back</h1>
  <p class="subtitle">Log in to find your route across campus.</p>
  <form method="POST">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" required>

    <label for="password">Password</label>
    <input type="password" id="password" name="password" required>

    <button type="submit" class="btn-primary">Log In</button>
  </form>
  <p class="auth-switch">New here? <a href="{{ url_for('register') }}">Create an account</a></p>
</div>
{% endblock %}
